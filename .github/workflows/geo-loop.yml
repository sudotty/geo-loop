name: GeoLoop

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"
  pull_request:
    paths:
      - "README.md"
      - "ROADMAP.md"
      - "docs/**"
      - "growth/**"
      - "src/**"
      - "package.json"
      - "tsconfig.json"

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  geo-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run sample scan
        run: npm run scan

      - name: Generate sample report
        run: npm run report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-loop-sample-report
          path: growth/reports/sample-growth-report.md
          if-no-files-found: error
